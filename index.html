<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Habits</title>
<style>
  :root {
    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface2: #f0f0f5;
    --text: #1c1c1e;
    --text2: #8e8e93;
    --sep: #e5e5ea;
    --green: #34c759;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --text: #fff;
      --text2: #8e8e93;
      --sep: #38383a;
      --green: #30d158;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation }
  html { overscroll-behavior: none }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh;
    /* bottom padding for home indicator */
    padding-bottom: env(safe-area-inset-bottom, 0px);
    overscroll-behavior: none;
  }
  @media (min-width: 500px) {
    body { background: #e0e0e8; padding: 40px 0 60px }
    @media (prefers-color-scheme: dark) { body { background: #111 } }
    .app-shell { border-radius: 40px; box-shadow: 0 24px 80px rgba(0,0,0,.22) }
  }
  .app-shell {
    max-width: 430px; margin: 0 auto;
    position: relative; overflow: hidden;
    min-height: 100dvh; background: var(--bg);
  }
  .overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    background: var(--bg);
    transform: translateX(100%);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
  }
  .overlay.open { transform: translateX(0) }
  #screen-detail { z-index: 50 }
  #screen-edit   { z-index: 100 }

  /* ── Main header ── */
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    /* top padding respects notch / Dynamic Island */
    padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 10px;
    position: sticky; top: 0; background: var(--bg); z-index: 20;
  }
  .icon-btn {
    /* 44×44 minimum touch target */
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: var(--surface); color: var(--text);
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 6px rgba(0,0,0,.1);
    transition: transform .12s, opacity .12s; user-select: none;
  }
  .icon-btn:active { transform: scale(.88); opacity: .7 }
  .main-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px }

  /* ── Date strip ── */
  .date-strip { display: flex; align-items: flex-end; padding: 4px 16px 10px }
  .ds-spacer { flex: 1 }
  .ds-cols { display: flex; width: 175px; flex-shrink: 0 }
  .ds-col { flex: 1; text-align: center; line-height: 1.2 }
  .ds-col .dn { font-size: 13px; font-weight: 600; color: var(--text2) }
  .ds-col .dw { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .3px }
  .ds-col.today .dn, .ds-col.today .dw { color: var(--text) }

  /* ── Progress ── */
  .progress-wrap { padding: 0 16px 14px }
  .progress-track { background: var(--sep); border-radius: 99px; height: 5px; overflow: hidden }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease }
  .progress-label { text-align: center; font-size: 12px; color: var(--text2); margin-top: 5px }

  /* ── Habit list ── */
  #screen-main {
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
  }
  .habit-list {
    margin: 0 16px; border-radius: 14px; overflow: hidden;
    background: var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .habit-row + .habit-row { border-top: 1px solid var(--sep) }
  .habit-row { display: flex; align-items: center; padding: 10px 12px; gap: 10px; background: transparent }

  /* SVG ring tap area — 44×44 minimum touch target */
  .ring-tap {
    flex-shrink: 0; width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; border-radius: 50%;
    transition: opacity .12s;
  }
  .ring-tap:active { opacity: .55 }

  .habit-info { flex: 1; min-width: 0; cursor: pointer; user-select: none }
  .habit-name {
    font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .habit-row.done .habit-name { color: var(--text2) !important; text-decoration: line-through; text-decoration-color: var(--text2) }
  .habit-streak { font-size: 11px; font-weight: 600; margin-top: 2px }
  .streak-hot { color: #FF6B35 }
  .streak-cold { color: var(--text2) }

  .day-inds { display: flex; width: 175px; flex-shrink: 0; cursor: pointer }
  .day-ind { flex: 1; display: flex; align-items: center; justify-content: center }
  .ind { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700 }
  .ind.done { color: #fff }
  .ind.missed { color: var(--sep); font-size: 17px; font-weight: 300; line-height: 1 }
  .ind.pending { border: 2px solid var(--sep) }

  /* ── Detail screen ── */
  .detail-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--sep);
    position: sticky; top: 0; z-index: 10;
  }
  .detail-back {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: var(--surface2);
    color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s; flex-shrink: 0;
  }
  .detail-back:active { opacity: .6 }
  .detail-hdr h2 {
    font-size: 17px; font-weight: 700; flex: 1;
    text-align: center; margin: 0 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .detail-edit-btn {
    padding: 7px 16px; border-radius: 99px;
    border: none; background: #007aff;
    color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s; flex-shrink: 0;
  }
  .detail-edit-btn:active { opacity: .7 }

  /* Freq row */
  .detail-freq {
    display: flex; align-items: center; justify-content: center; gap: 32px;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--sep);
  }
  .freq-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text2) }
  .freq-item span { font-size: 14px }

  .detail-body { padding: 16px 16px 0 }

  /* Section style (flat, like iOS) */
  .detail-section-title {
    font-size: 13px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .5px;
    margin: 20px 0 8px 4px;
  }
  .detail-section { background: var(--surface); border-radius: 14px; overflow: hidden }

  /* Overview */
  .overview-row { display: flex; align-items: center; padding: 20px 16px; gap: 16px }
  .overview-ring { flex-shrink: 0 }
  .overview-stats { display: flex; flex: 1 }
  .stat-col { flex: 1; text-align: center }
  .stat-val { font-size: 22px; font-weight: 700 }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 3px }

  /* Calendar */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 8px;
    border-bottom: 1px solid var(--sep);
  }
  .cal-nav-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: var(--surface2); color: var(--text);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav-btn:active { opacity: .6 }
  .cal-month-label { font-size: 15px; font-weight: 600 }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 8px 12px; gap: 2px }
  .cal-hdr { text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); padding: 4px 0 6px }
  .cal-cell { display: flex; align-items: center; justify-content: center; padding: 2px 0 }
  .cal-day { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px }
  .cal-day.done { color: #fff }
  .cal-day.today { font-weight: 700 }
  .cal-day.future { color: var(--text2); opacity: .35 }

  /* Chart */
  .chart-toggle { display: flex; gap: 6px; padding: 14px 16px 10px; border-bottom: 1px solid var(--sep) }
  .toggle-btn { padding: 5px 16px; border-radius: 99px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--surface2); color: var(--text2) }
  .toggle-btn.active { background: var(--text); color: var(--bg) }
  .chart-wrap { padding: 8px 12px 12px }

  .detail-delete {
    display: block; width: 100%; padding: 16px; border: none;
    background: var(--surface); border-radius: 14px;
    color: #ff3b30; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 12px; margin-bottom: 12px;
  }
  .detail-delete:active { opacity: .6 }

  /* ── Edit / Add screen ── */
  .edit-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 14px;
    border-bottom: 1px solid var(--sep);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .edit-cancel { background: none; border: none; font-size: 16px; color: var(--text2); cursor: pointer; padding: 4px 0 }
  .edit-cancel:active { opacity: .6 }
  .edit-save {
    padding: 8px 20px; border-radius: 99px;
    border: none; background: var(--text); color: var(--bg);
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .edit-save:active { opacity: .7 }
  .edit-hdr h2 { font-size: 17px; font-weight: 700 }

  .edit-body { padding: 0 16px }
  .edit-section-title {
    font-size: 12px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .6px;
    margin: 20px 0 8px 4px;
  }
  .edit-card { background: var(--surface); border-radius: 14px; overflow: hidden }

  /* Name field with color dot */
  .name-row { display: flex; align-items: center; padding-right: 14px }
  .name-input {
    flex: 1; padding: 14px 12px 14px 16px;
    border: none; background: transparent;
    font-size: 16px; color: var(--text); font-family: inherit; outline: none;
  }
  .name-input::placeholder { color: var(--text2) }
  .color-dot-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    cursor: pointer; flex-shrink: 0;
    transition: transform .15s;
  }
  .color-dot-btn:active { transform: scale(.88) }

  .sep-line { height: 1px; background: var(--sep); margin: 0 16px }

  /* Regularity rows */
  .reg-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
  }
  .reg-row + .reg-row { border-top: 1px solid var(--sep) }
  .reg-label { font-size: 16px }
  .reg-value { font-size: 15px; color: var(--text2) }

  /* iOS toggle — wrapper expands hit area to 44px */
  .ios-toggle { position: relative; width: 51px; height: 44px; flex-shrink: 0; display: flex; align-items: center }
  .ios-toggle input { opacity: 0; width: 0; height: 0 }
  .ios-track {
    position: relative; width: 51px; height: 31px; flex-shrink: 0;
    background: var(--sep); border-radius: 99px;
    cursor: pointer; transition: background .2s;
  }
  .ios-track::after {
    content: ''; position: absolute;
    width: 27px; height: 27px; left: 2px; top: 2px;
    background: #fff; border-radius: 50%;
    box-shadow: 0 2px 4px rgba(0,0,0,.25);
    transition: transform .2s;
  }
  .ios-toggle input:checked + .ios-track { background: var(--green) }
  .ios-toggle input:checked + .ios-track::after { transform: translateX(20px) }

  /* Emoji grid */
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); padding: 10px 8px; gap: 4px }
  .emoji-btn {
    aspect-ratio: 1; border-radius: 10px; border: none;
    background: transparent; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .emoji-btn:active, .emoji-btn.selected { background: var(--sep) }

  /* Color grid */
  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); padding: 12px; gap: 10px }
  .color-circle {
    aspect-ratio: 1; border-radius: 50%; border: none;
    cursor: pointer; transition: transform .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .color-circle:active { transform: scale(.88) }
  .color-circle .ck { font-size: 13px; color: #fff; font-weight: 700; opacity: 0 }
  .color-circle.selected .ck { opacity: 1 }
</style>
</head>
<body>
<div class="app-shell">

  <!-- ══ MAIN ══ -->
  <div id="screen-main">
    <div class="main-header">
      <button class="icon-btn">⚙️</button>
      <h1>Habits</h1>
      <button class="icon-btn" onclick="openAdd()">＋</button>
    </div>
    <div class="date-strip">
      <div class="ds-spacer"></div>
      <div class="ds-cols" id="ds-cols"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="bar" style="width:0%"></div></div>
      <p class="progress-label" id="prog-label"></p>
    </div>
    <div class="habit-list" id="list"></div>
  </div>

  <!-- ══ DETAIL ══ -->
  <div class="overlay" id="screen-detail">
    <div class="detail-hdr" id="detail-hdr">
      <button class="detail-back" onclick="closeDetail()">‹</button>
      <h2 id="detail-title"></h2>
      <button class="detail-edit-btn" onclick="openEdit(currentHabitId)">Edit</button>
    </div>
    <div class="detail-freq" id="detail-freq">
      <div class="freq-item">🔄 <span>Todos os dias</span></div>
      <div class="freq-item">⏰ <span id="detail-time">--:--</span></div>
    </div>
    <div class="detail-body">
      <div class="detail-section-title">Visão Geral</div>
      <div class="detail-section">
        <div class="overview-row">
          <div class="overview-ring" id="detail-ring"></div>
          <div class="overview-stats">
            <div class="stat-col">
              <div class="stat-val" id="stat-score">0%</div>
              <div class="stat-lbl">Score</div>
            </div>
            <div class="stat-col">
              <div class="stat-val" id="stat-month">+0%</div>
              <div class="stat-lbl">Mês</div>
            </div>
            <div class="stat-col">
              <div class="stat-val" id="stat-year">+0%</div>
              <div class="stat-lbl">Ano</div>
            </div>
          </div>
        </div>
      </div>

      <div class="detail-section-title">Histórico</div>
      <div class="detail-section" id="detail-cal"></div>

      <div class="detail-section-title">Força do Hábito</div>
      <div class="detail-section">
        <div class="chart-toggle">
          <button class="toggle-btn active" id="btn-month" onclick="setChartView('month')">Mês</button>
          <button class="toggle-btn"        id="btn-year"  onclick="setChartView('year')">Ano</button>
        </div>
        <div class="chart-wrap" id="detail-chart"></div>
      </div>

      <button class="detail-delete" onclick="confirmDelete()">Deletar hábito</button>
    </div>
  </div>

  <!-- ══ EDIT / ADD ══ -->
  <div class="overlay" id="screen-edit">
    <div class="edit-hdr">
      <button class="edit-cancel" onclick="closeEdit()">Cancelar</button>
      <h2 id="edit-title">Novo Hábito</h2>
      <button class="edit-save" onclick="saveHabit()">Salvar</button>
    </div>
    <div class="edit-body">

      <!-- Name + color dot -->
      <div class="edit-section-title">Nome</div>
      <div class="edit-card">
        <div class="name-row">
          <input class="name-input" id="edit-name" type="text" maxlength="40" placeholder="Ex: Beber água" oninput="updateDot()">
          <button class="color-dot-btn" id="color-dot" onclick="toggleColorPicker()"></button>
        </div>
      </div>

      <!-- Emoji -->
      <div class="edit-section-title">Emoji</div>
      <div class="edit-card">
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>

      <!-- Color picker (hidden by default) -->
      <div id="color-section" style="display:none">
        <div class="edit-section-title">Cor</div>
        <div class="edit-card">
          <div class="color-grid" id="color-grid"></div>
        </div>
      </div>

      <!-- Question -->
      <div class="edit-section-title">Pergunta</div>
      <div class="edit-card">
        <input class="name-input" id="edit-question" type="text" maxlength="80" placeholder="Você fez isso hoje?">
      </div>

      <!-- Regularity -->
      <div class="edit-section-title">Regularidade</div>
      <div class="edit-card">
        <div class="reg-row">
          <span class="reg-label">Repetir</span>
          <span class="reg-value">Todos os dias</span>
        </div>
        <div class="sep-line"></div>
        <div class="reg-row">
          <span class="reg-label">Me lembrar</span>
          <label class="ios-toggle">
            <input type="checkbox" id="edit-remind" onchange="updateDot()">
            <span class="ios-track"></span>
          </label>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const DEFAULT_HABITS = [
  {id:'h1',  emoji:'⏰', name:'Acordar às 04:20',         color:'#FF6B6B', question:'Você acordou às 04:20?',  remind:false},
  {id:'h2',  emoji:'💧', name:'500ml água em jejum',       color:'#4ECDC4', question:'Bebeu 500ml em jejum?',   remind:false},
  {id:'h3',  emoji:'☀️', name:'Luz solar de manhã',        color:'#F9C74F', question:'Se expôs ao sol?',        remind:false},
  {id:'h4',  emoji:'💊', name:'Minoxidil + Biotina + Dut', color:'#90BE6D', question:'Tomou os suplementos?',   remind:false},
  {id:'h5',  emoji:'📖', name:'Devocional',                color:'#C77DFF', question:'Fez o devocional?',       remind:false},
  {id:'h6',  emoji:'📚', name:'Leitura 30 min',            color:'#F3722C', question:'Leu por 30 minutos?',     remind:false},
  {id:'h7',  emoji:'💪', name:'Treino de força',           color:'#F94144', question:'Treinou hoje?',           remind:false},
  {id:'h8',  emoji:'🥤', name:'Creatina',                  color:'#43AA8B', question:'Tomou creatina?',         remind:false},
  {id:'h9',  emoji:'🏃', name:'Cardio 30 min',             color:'#277DA1', question:'Fez cardio?',             remind:false},
  {id:'h10', emoji:'🥗', name:'Dieta',                     color:'#80B918', question:'Manteve a dieta?',        remind:false},
  {id:'h11', emoji:'💧', name:'4 litros de água',          color:'#0096C7', question:'Bebeu 4 litros de água?', remind:false},
  {id:'h12', emoji:'😴', name:'Dormir às 21:30',           color:'#9B72CF', question:'Dormiu às 21:30?',        remind:false},
];

const EMOJIS = [
  '⏰','🌅','☀️','🌙','💧','🔥','⚡','🌱',
  '💪','🏃','🚴','🧘','🏊','⚽','🏋️','🤸',
  '🥗','🍎','🥤','☕','💊','🩺','🧴','🪥',
  '📖','📚','✏️','💻','🎨','🎵','🎯','🏆',
  '💰','📝','🧠','❤️','😴','🛌','🚿','✅',
];

const COLORS = [
  '#FF6B6B','#F3722C','#F9C74F','#90BE6D',
  '#43AA8B','#4ECDC4','#277DA1','#5E60CE',
  '#C77DFF','#F94144','#0096C7','#9B72CF',
];

const WDAYS     = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const WDAYS_MON = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const MONTHS    = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_S  = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let currentHabitId  = null;
let editingHabitId  = null;
let editEmoji       = EMOJIS[0];
let editColor       = COLORS[0];
let detailYear, detailMonth;
let detailChartView = 'month';
let colorPickerOpen = false;

// ── Storage ─────────────────────────────────────────
function getHabits() { return JSON.parse(localStorage.getItem('habits') || 'null') || DEFAULT_HABITS }
function saveHabits(h) { localStorage.setItem('habits', JSON.stringify(h)) }
function getComp()     { return JSON.parse(localStorage.getItem('comp') || '{}') }
function saveComp(c)   { localStorage.setItem('comp', JSON.stringify(c)) }
function today()       { return new Date().toISOString().slice(0, 10) }
function uid()         { return 'h' + Date.now().toString(36) }

function last5() {
  return Array.from({length:5}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(4-i));
    return d.toISOString().slice(0,10);
  });
}

// ── Calcs ────────────────────────────────────────────
function calcStreak(id, comp) {
  const t = today(), d = new Date(t+'T12:00:00');
  if (!(comp[t]||[]).includes(id)) d.setDate(d.getDate()-1);
  let n=0;
  while(n<3650){ const k=d.toISOString().slice(0,10); if((comp[k]||[]).includes(id)){n++;d.setDate(d.getDate()-1);}else break; }
  return n;
}

function calcScore(id, comp) {
  const t=today(), now=new Date(t+'T12:00:00');
  const allDates=Object.keys(comp).filter(d=>d<=t).sort();
  let totalDays=1, totalDone=0;
  if(allDates.length){
    const start=new Date(allDates[0]+'T12:00:00');
    totalDays=Math.max(1,Math.round((now-start)/86400000)+1);
    for(const [day,ids] of Object.entries(comp)) if(day<=t&&ids.includes(id)) totalDone++;
  }
  const dom=now.getDate(); let mDone=0;
  for(let i=1;i<=dom;i++){
    const k=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if((comp[k]||[]).includes(id)) mDone++;
  }
  const ys=new Date(now.getFullYear(),0,1), doy=Math.round((now-ys)/86400000)+1;
  let yDone=0;
  for(let i=0;i<doy;i++){
    const k=new Date(ys.getTime()+i*86400000).toISOString().slice(0,10);
    if(k<=t&&(comp[k]||[]).includes(id)) yDone++;
  }
  return {
    score: Math.round(totalDone/totalDays*100),
    month: Math.round(mDone/dom*100),
    year:  Math.round(yDone/doy*100),
  };
}

function monthPct(id, comp) {
  const now=new Date(), dom=now.getDate(); let done=0;
  for(let i=1;i<=dom;i++){
    const k=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if((comp[k]||[]).includes(id)) done++;
  }
  return dom>0 ? done/dom : 0;
}

// ── SVG ──────────────────────────────────────────────
function miniRing(id, comp, color) {
  const S=34,r=14,cx=17,cy=17;
  const circ=+(2*Math.PI*r).toFixed(2);
  const pct=monthPct(id,comp);
  const off=+(circ*(1-pct)).toFixed(2);
  const isDone=(comp[today()]||[]).includes(id);
  const arc=pct>0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="2.5"
    stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`:'';
  const center=isDone
    ?`<text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="12" font-weight="700" fill="${color}">✓</text>`
    :'';
  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--sep)" stroke-width="2.5"/>
    ${arc}${center}</svg>`;
}

function bigRing(pct, color) {
  const S=78,r=30,cx=39,cy=39;
  const circ=+(2*Math.PI*r).toFixed(2), off=+(circ*(1-pct/100)).toFixed(2);
  const arc=pct>0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
    stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`:'';
  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--sep)" stroke-width="5"/>
    ${arc}
    <text x="${cx}" y="${cy+6}" text-anchor="middle" font-size="14" font-weight="700" fill="${color}">${pct}%</text>
  </svg>`;
}

function chartHTML(id, comp, color, view) {
  const W=320,H=110,pL=28,pR=8,pT=8,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const x=f=>pL+f*cW, y=v=>pT+(1-v/100)*cH;
  let pts=[];
  if(view==='month'){
    for(let i=0;i<30;i++){
      const d=new Date();d.setDate(d.getDate()-(29-i));
      pts.push({f:i/29,v:(comp[d.toISOString().slice(0,10)]||[]).includes(id)?100:0});
    }
  } else {
    for(let i=0;i<12;i++){
      const d=new Date();d.setMonth(d.getMonth()-(11-i));
      const yr=d.getFullYear(),mo=d.getMonth(),dim=new Date(yr,mo+1,0).getDate(),last=i===11?new Date().getDate():dim;
      let done=0;
      for(let day=1;day<=last;day++){
        const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if((comp[k]||[]).includes(id)) done++;
      }
      pts.push({f:i/11,v:Math.round(done/last*100)});
    }
  }
  const poly=pts.map(p=>`${x(p.f).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
  const area=`${x(0).toFixed(1)},${(pT+cH).toFixed(1)} ${poly} ${x(1).toFixed(1)},${(pT+cH).toFixed(1)}`;
  const grid=[0,50,100].map(v=>`<line x1="${pL}" y1="${y(v).toFixed(1)}" x2="${pL+cW}" y2="${y(v).toFixed(1)}" stroke="var(--sep)" stroke-width="0.5"/>
    <text x="${pL-3}" y="${(y(v)+4).toFixed(1)}" text-anchor="end" font-size="8" fill="var(--text2)">${v}</text>`).join('');
  const ticks=view==='month'
    ?[0,7,14,21,29].map(i=>{const d=new Date();d.setDate(d.getDate()-(29-i));return `<text x="${x(i/29).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--text2)">${d.getDate()}/${d.getMonth()+1}</text>`;}).join('')
    :[0,3,6,9,11].map(i=>{const d=new Date();d.setMonth(d.getMonth()-(11-i));return `<text x="${x(i/11).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--text2)">${MONTHS_S[d.getMonth()]}</text>`;}).join('');
  const dots=pts.map(p=>`<circle cx="${x(p.f).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.5" fill="${color}"/>`).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${grid}<polygon points="${area}" fill="${color}20"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${ticks}</svg>`;
}

function calendarHTML(id, comp, color, yr, mo) {
  const t=today(), firstDow=(new Date(yr,mo,1).getDay()+6)%7, dim=new Date(yr,mo+1,0).getDate();
  let cells='';
  for(let i=0;i<firstDow;i++) cells+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=dim;d++){
    const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done=(comp[k]||[]).includes(id), isT=k===t, isFut=k>t;
    let cls='cal-day',sty='';
    if(done){cls+=' done';sty=`background:${color}`}
    else if(isT){cls+=' today';sty=`border:2.5px solid ${color};color:${color}`}
    else if(isFut){cls+=' future'}
    cells+=`<div class="cal-cell"><div class="${cls}" style="${sty}">${d}</div></div>`;
  }
  return `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="navMonth(-1)">‹</button>
    <span class="cal-month-label">${MONTHS[mo]} ${yr}</span>
    <button class="cal-nav-btn" onclick="navMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    ${WDAYS_MON.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
    ${cells}
  </div>`;
}

// ── Detail ────────────────────────────────────────────
function openDetail(id) {
  currentHabitId=id;
  const now=new Date(); detailYear=now.getFullYear(); detailMonth=now.getMonth();
  detailChartView='month';
  renderDetail();
  document.getElementById('screen-detail').classList.add('open');
  document.getElementById('screen-detail').scrollTop=0;
}

function closeDetail() {
  document.getElementById('screen-detail').classList.remove('open');
  currentHabitId=null;
}

function navMonth(dir) {
  detailMonth+=dir;
  if(detailMonth<0){detailMonth=11;detailYear--}
  if(detailMonth>11){detailMonth=0;detailYear++}
  renderDetail();
}

function setChartView(v) {
  detailChartView=v;
  document.getElementById('btn-month').classList.toggle('active',v==='month');
  document.getElementById('btn-year').classList.toggle('active',v==='year');
  const h=getHabits().find(h=>h.id===currentHabitId);
  document.getElementById('detail-chart').innerHTML=chartHTML(h.id,getComp(),h.color,v);
}

function renderDetail() {
  const h=getHabits().find(h=>h.id===currentHabitId); if(!h) return;
  const comp=getComp(); const {score,month,year}=calcScore(h.id,comp);
  document.getElementById('detail-title').textContent=`${h.emoji} ${h.name}`;
  document.getElementById('detail-ring').innerHTML=bigRing(score,h.color);
  document.getElementById('stat-score').textContent=`${score}%`;
  document.getElementById('stat-score').style.color=h.color;
  document.getElementById('stat-month').textContent=`+${month}%`;
  document.getElementById('stat-month').style.color=h.color;
  document.getElementById('stat-year').textContent=`+${year}%`;
  document.getElementById('stat-year').style.color=h.color;
  document.getElementById('detail-cal').innerHTML=calendarHTML(h.id,comp,h.color,detailYear,detailMonth);
  document.getElementById('detail-chart').innerHTML=chartHTML(h.id,comp,h.color,detailChartView);
  document.getElementById('btn-month').classList.toggle('active',detailChartView==='month');
  document.getElementById('btn-year').classList.toggle('active',detailChartView==='year');
}

function confirmDelete() {
  const h=getHabits().find(h=>h.id===currentHabitId); if(!h) return;
  if(!confirm(`Deletar "${h.name}"?`)) return;
  saveHabits(getHabits().filter(h=>h.id!==currentHabitId));
  closeDetail(); render();
}

// ── Edit / Add ────────────────────────────────────────
function buildPickers() {
  document.getElementById('emoji-grid').innerHTML=EMOJIS.map(e=>
    `<button class="emoji-btn${e===editEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</button>`
  ).join('');
  document.getElementById('color-grid').innerHTML=COLORS.map(c=>
    `<button class="color-circle${c===editColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')">
       <span class="ck">✓</span></button>`
  ).join('');
  document.getElementById('color-dot').style.background=editColor;
}

function updateDot() {
  document.getElementById('color-dot').style.background=editColor;
}

function toggleColorPicker() {
  colorPickerOpen=!colorPickerOpen;
  document.getElementById('color-section').style.display=colorPickerOpen?'block':'none';
}

function selectEmoji(e) {
  editEmoji=e;
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.toggle('selected',b.textContent===e));
}

function selectColor(c) {
  editColor=c;
  document.querySelectorAll('.color-circle').forEach(b=>b.classList.toggle('selected',b.style.background===c||b.style.backgroundColor===c));
  document.getElementById('color-dot').style.background=c;
}

function openAdd() {
  editingHabitId=null; editEmoji=EMOJIS[0]; editColor=COLORS[0]; colorPickerOpen=false;
  document.getElementById('edit-title').textContent='Novo Hábito';
  document.getElementById('edit-name').value='';
  document.getElementById('edit-question').value='';
  document.getElementById('edit-remind').checked=false;
  document.getElementById('color-section').style.display='none';
  buildPickers();
  document.getElementById('screen-edit').classList.add('open');
  document.getElementById('screen-edit').scrollTop=0;
  setTimeout(()=>document.getElementById('edit-name').focus(),350);
}

function openEdit(id) {
  const h=getHabits().find(h=>h.id===id); if(!h) return;
  editingHabitId=id; editEmoji=h.emoji; editColor=h.color; colorPickerOpen=false;
  document.getElementById('edit-title').textContent='Editar Hábito';
  document.getElementById('edit-name').value=h.name;
  document.getElementById('edit-question').value=h.question||'';
  document.getElementById('edit-remind').checked=!!h.remind;
  document.getElementById('color-section').style.display='none';
  buildPickers();
  document.getElementById('screen-edit').classList.add('open');
  document.getElementById('screen-edit').scrollTop=0;
}

function closeEdit() { document.getElementById('screen-edit').classList.remove('open') }

function saveHabit() {
  const name=document.getElementById('edit-name').value.trim();
  if(!name){document.getElementById('edit-name').focus();return;}
  const question=document.getElementById('edit-question').value.trim();
  const remind=document.getElementById('edit-remind').checked;
  const habits=getHabits();
  if(editingHabitId){
    const h=habits.find(h=>h.id===editingHabitId);
    if(h){h.name=name;h.emoji=editEmoji;h.color=editColor;h.question=question;h.remind=remind;}
  } else {
    habits.push({id:uid(),emoji:editEmoji,name,color:editColor,question,remind});
  }
  saveHabits(habits); closeEdit();
  if(editingHabitId) renderDetail();
  render();
}

// ── Toggle ────────────────────────────────────────────
function toggle(id, e) {
  e.stopPropagation();
  const c=getComp(),d=today();
  c[d]=c[d]||[];
  const i=c[d].indexOf(id);
  i>=0?c[d].splice(i,1):c[d].push(id);
  saveComp(c); render();
  if(currentHabitId===id) renderDetail();
}

// ── Main render ───────────────────────────────────────
function render() {
  const habits=getHabits(), comp=getComp(), t=today(), days=last5();

  document.getElementById('ds-cols').innerHTML=days.map(d=>{
    const dt=new Date(d+'T12:00:00'),isT=d===t;
    return `<div class="ds-col${isT?' today':''}"><div class="dn">${dt.getDate()}</div><div class="dw">${WDAYS[dt.getDay()]}</div></div>`;
  }).join('');

  const done=(comp[t]||[]).length, total=habits.length;
  const color = total ? (done===total?'#34c759':'#007aff') : '#8e8e93';
  document.getElementById('bar').style.width=total?(done/total*100)+'%':'0%';
  document.getElementById('bar').style.background=color;
  document.getElementById('prog-label').innerHTML=
    `<b style="color:${color}">${done}</b> / ${total} concluídos hoje`;

  document.getElementById('list').innerHTML = habits.length
    ? habits.map(h=>{
        const isDone=(comp[t]||[]).includes(h.id);
        const streak=calcStreak(h.id,comp);
        const streakHtml=streak>0
          ?`<div class="habit-streak ${streak>=3?'streak-hot':'streak-cold'}">🔥 ${streak} ${streak===1?'dia':'dias'}</div>`:'';
        const inds=days.map(d=>{
          if(d>t) return `<div class="day-ind"><div class="ind"></div></div>`;
          const ok=(comp[d]||[]).includes(h.id);
          if(ok)    return `<div class="day-ind"><div class="ind done" style="background:${h.color}">✓</div></div>`;
          if(d===t) return `<div class="day-ind"><div class="ind pending"></div></div>`;
          return `<div class="day-ind"><div class="ind missed">×</div></div>`;
        }).join('');
        return `<div class="habit-row${isDone?' done':''}">
          <div class="ring-tap" onclick="toggle('${h.id}',event)">${miniRing(h.id,comp,h.color)}</div>
          <div class="habit-info" onclick="openDetail('${h.id}')">
            <div class="habit-name" style="${isDone?'':` color:${h.color}`}">${h.emoji} ${h.name}</div>
            ${streakHtml}
          </div>
          <div class="day-inds" onclick="openDetail('${h.id}')">${inds}</div>
        </div>`;
      }).join('')
    : `<div style="padding:32px;text-align:center;color:var(--text2);font-size:15px">Nenhum hábito.<br>Toque em <b>＋</b> para adicionar.</div>`;
}

render();
</script>
