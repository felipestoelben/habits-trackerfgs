<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Habits</title>
<script>
  (function(){
    const s = localStorage.getItem('theme');
    const dark = s ? s==='dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  })();
</script>
<style>
/* ── Design Tokens ─────────────────────────────────── */
:root {
  --bg:         #F2F2F7;
  --surface:    #FFFFFF;
  --surface2:   #F2F2F7;
  --surface3:   #E5E5EA;
  --text:       #1C1C1E;
  --text2:      #6C6C70;
  --text3:      #AEAEB2;
  --sep:        #E5E5EA;
  --accent:     #6366F1;
  --accent-rgb: 99,102,241;
  --accent-lt:  rgba(99,102,241,.12);
  --green:      #34C759;
  --red:        #FF3B30;
  --shadow-sm:  0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 18px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:  0 10px 40px rgba(0,0,0,.13), 0 4px 12px rgba(0,0,0,.07);
  --r-sm: 10px; --r-md: 16px; --r-lg: 20px; --r-xl: 28px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #000; --surface: #1C1C1E; --surface2: #2C2C2E; --surface3: #3A3A3C;
    --text: #FFF; --text2: #8E8E93; --text3: #48484A; --sep: #38383A;
    --accent: #818CF8; --accent-rgb: 129,140,248; --accent-lt: rgba(129,140,248,.15);
    --green: #30D158;
    --shadow-sm: 0 1px 4px rgba(0,0,0,.35); --shadow-md: 0 4px 18px rgba(0,0,0,.45); --shadow-lg: 0 10px 40px rgba(0,0,0,.55);
  }
}
[data-theme="dark"] {
  --bg: #000; --surface: #1C1C1E; --surface2: #2C2C2E; --surface3: #3A3A3C;
  --text: #FFF; --text2: #8E8E93; --text3: #48484A; --sep: #38383A;
  --accent: #818CF8; --accent-rgb: 129,140,248; --accent-lt: rgba(129,140,248,.15);
  --green: #30D158;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.35); --shadow-md: 0 4px 18px rgba(0,0,0,.45); --shadow-lg: 0 10px 40px rgba(0,0,0,.55);
}
[data-theme="light"] {
  --bg: #F2F2F7; --surface: #FFF; --surface2: #F2F2F7; --surface3: #E5E5EA;
  --text: #1C1C1E; --text2: #6C6C70; --text3: #AEAEB2; --sep: #E5E5EA;
  --accent: #6366F1; --accent-rgb: 99,102,241; --accent-lt: rgba(99,102,241,.12);
  --green: #34C759; --red: #FF3B30;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 18px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.13), 0 4px 12px rgba(0,0,0,.07);
}

/* ── Reset ─────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation }
html { overscroll-behavior: none }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
@media (min-width: 500px) {
  body { background: #C7C7D4; padding: 48px 0 64px }
  .app-shell {
    border-radius: 48px;
    box-shadow: 0 36px 110px rgba(0,0,0,.30), 0 0 0 1px rgba(0,0,0,.05);
  }
}
[data-theme="dark"] body { background: #0A0A0C }
.app-shell {
  max-width: 430px; margin: 0 auto;
  position: relative; overflow: hidden;
  min-height: 100dvh; background: var(--bg);
}

/* ── Overlay screens ───────────────────────────────── */
.overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform .36s cubic-bezier(.32,0,.2,1);
  padding-bottom: calc(env(safe-area-inset-bottom,0px) + 60px);
}
.overlay.open { transform: translateX(0) }
#screen-detail { z-index: 50 }
#screen-edit   { z-index: 100 }

/* ── Main header ───────────────────────────────────── */
.main-header {
  padding: calc(env(safe-area-inset-top,0px) + 22px) 20px 0;
  position: sticky; top: 0; background: var(--bg); z-index: 20;
}
.header-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding-bottom: 2px;
}
.header-greeting {
  font-size: 26px; font-weight: 800; letter-spacing: -.5px; line-height: 1.15;
}
.header-date {
  font-size: 13px; color: var(--text2); margin-top: 3px; font-weight: 500;
}
.header-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px }
.icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: none; background: var(--surface); color: var(--text);
  font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: transform .12s, opacity .12s; user-select: none;
}
.icon-btn:active { transform: scale(.86); opacity: .7 }
.add-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #818CF8 0%, #6366F1 50%, #4F46E5 100%);
  color: #fff; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(var(--accent-rgb),.45);
  transition: transform .12s, opacity .12s; user-select: none;
}
.add-btn:active { transform: scale(.86); opacity: .85 }

/* ── Progress hero card ────────────────────────────── */
.progress-hero {
  margin: 16px 16px 0;
  background: var(--surface);
  border-radius: var(--r-xl);
  padding: 20px 20px 20px 18px;
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; gap: 18px;
}
.hero-ring-wrap {
  flex-shrink: 0; position: relative;
  width: 84px; height: 84px;
}
.hero-ring-wrap svg { display: block }
.hero-ring-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.hero-pct {
  font-size: 21px; font-weight: 900; letter-spacing: -.5px;
  line-height: 1; color: var(--accent);
}
.hero-pct-lbl {
  font-size: 9px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: .6px; margin-top: 1px;
}
.hero-info { flex: 1 }
.hero-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px }
.hero-sub { font-size: 13px; color: var(--text2); margin-top: 2px; font-weight: 500 }
.hero-track {
  margin-top: 12px; height: 5px; border-radius: 99px;
  background: var(--sep); overflow: hidden;
}
.hero-fill {
  height: 100%; border-radius: 99px;
  transition: width .7s cubic-bezier(.34,1.4,.64,1);
}

/* ── Date strip ────────────────────────────────────── */
.date-strip-wrap {
  display: flex; align-items: flex-end;
  padding: 16px 20px 8px;
}
.ds-label { font-size: 12px; font-weight: 700; color: var(--text2); flex: 1; text-transform: uppercase; letter-spacing: .4px }
.ds-cols { display: flex; width: 150px; flex-shrink: 0 }
.ds-col { flex: 1; text-align: center; line-height: 1.2 }
.ds-col .dn { font-size: 12px; font-weight: 600; color: var(--text2) }
.ds-col .dw { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .2px }
.ds-col.today .dn { color: var(--accent); font-weight: 800 }
.ds-col.today .dw { color: var(--accent) }

/* ── Habit list ────────────────────────────────────── */
#screen-main { padding-bottom: calc(env(safe-area-inset-bottom,0px) + 32px) }
.habit-list {
  margin: 0 16px; border-radius: var(--r-lg); overflow: hidden;
  background: var(--surface); box-shadow: var(--shadow-sm);
}
.habit-row {
  display: flex; align-items: center;
  padding: 10px 12px; gap: 10px;
  background: transparent; position: relative;
}
.habit-row + .habit-row { border-top: 1px solid var(--sep) }

.ring-tap {
  flex-shrink: 0; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; border-radius: 50%;
  margin: 0 -4px;
  transition: opacity .12s, transform .1s;
}
.ring-tap:active { opacity: .5; transform: scale(.86) }

.habit-info { flex: 1; min-width: 0; cursor: pointer; user-select: none }
.habit-name {
  font-size: 15px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.habit-row.done .habit-name {
  color: var(--text3) !important;
  text-decoration: line-through; text-decoration-color: var(--text3);
}
.habit-streak { font-size: 11px; font-weight: 700; margin-top: 2px }
.streak-hot  { color: #FF6B35 }
.streak-cold { color: var(--text2) }

.day-inds { display: flex; width: 150px; flex-shrink: 0; cursor: pointer }
.day-ind  { flex: 1; display: flex; align-items: center; justify-content: center }
.ind { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700 }
.ind.done    { color: #fff }
.ind.missed  { color: var(--text3); font-size: 15px; font-weight: 300 }
.ind.pending { border: 2px solid var(--sep) }

/* ── Empty state ───────────────────────────────────── */
.empty-state {
  padding: 52px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  background: var(--surface); border-radius: var(--r-lg);
  margin: 0 16px; box-shadow: var(--shadow-sm);
}
.empty-icon  { font-size: 54px; line-height: 1 }
.empty-title { font-size: 18px; font-weight: 800; letter-spacing: -.2px }
.empty-sub   { font-size: 14px; color: var(--text2); text-align: center; max-width: 230px; line-height: 1.5 }
.empty-cta {
  margin-top: 8px; padding: 13px 32px;
  border-radius: 99px; border: none;
  background: linear-gradient(135deg, #818CF8 0%, #6366F1 50%, #4F46E5 100%);
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 5px 16px rgba(var(--accent-rgb),.45);
  transition: opacity .15s, transform .12s;
}
.empty-cta:active { opacity: .8; transform: scale(.95) }

/* ── Detail screen ─────────────────────────────────── */
.detail-hdr {
  padding: calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;
  background: var(--surface); border-bottom: 1px solid var(--sep);
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: var(--surface2); color: var(--text2);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.back-btn:active { opacity: .6 }
.detail-hdr h2 {
  font-size: 17px; font-weight: 700; flex: 1;
  text-align: center; margin: 0 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.edit-pill-btn {
  padding: 7px 16px; border-radius: 99px;
  border: none; background: var(--accent-lt);
  color: var(--accent); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity .15s; flex-shrink: 0;
}
.edit-pill-btn:active { opacity: .7 }

.detail-freq {
  display: flex; align-items: center; justify-content: center; gap: 24px;
  padding: 12px 16px; background: var(--surface);
  border-bottom: 1px solid var(--sep);
}
.freq-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; color: var(--text2);
}

.detail-body { padding: 16px }
.detail-section-title {
  font-size: 11px; font-weight: 800; color: var(--text2);
  text-transform: uppercase; letter-spacing: .7px;
  margin: 20px 0 8px 4px;
}
.detail-section {
  background: var(--surface); border-radius: var(--r-lg);
  overflow: hidden; box-shadow: var(--shadow-sm);
}

.overview-row { display: flex; align-items: center; padding: 20px 16px; gap: 16px }
.overview-ring { flex-shrink: 0 }
.overview-stats { display: flex; flex: 1 }
.stat-col { flex: 1; text-align: center }
.stat-val { font-size: 22px; font-weight: 900; letter-spacing: -.4px }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px }

.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 8px; border-bottom: 1px solid var(--sep);
}
.cal-nav-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--surface2); color: var(--text2);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.cal-nav-btn:active { opacity: .6 }
.cal-month-label { font-size: 15px; font-weight: 700 }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 10px 14px; gap: 2px }
.cal-hdr { text-align: center; font-size: 10px; font-weight: 700; color: var(--text2); padding: 4px 0 6px; text-transform: uppercase; letter-spacing: .3px }
.cal-cell { display: flex; align-items: center; justify-content: center; padding: 2px 0 }
.cal-day { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500 }
.cal-day.done   { color: #fff; font-weight: 700 }
.cal-day.today  { font-weight: 800 }
.cal-day.future { color: var(--text3) }

.chart-toggle {
  display: flex; gap: 6px; padding: 12px 14px 10px;
  border-bottom: 1px solid var(--sep);
}
.toggle-btn {
  padding: 6px 18px; border-radius: 99px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--surface2); color: var(--text2);
  transition: background .15s, color .15s;
}
.toggle-btn.active { background: var(--accent); color: #fff }
.chart-wrap { padding: 10px 12px 14px }

.detail-delete {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px; border: none;
  background: var(--surface); border-radius: var(--r-lg);
  color: var(--red); font-size: 16px; font-weight: 700;
  cursor: pointer; margin-top: 12px; margin-bottom: 4px;
  box-shadow: var(--shadow-sm); transition: opacity .15s;
}
.detail-delete:active { opacity: .6 }

/* ── Edit / Add screen ─────────────────────────────── */
.edit-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;
  border-bottom: 1px solid var(--sep);
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.edit-cancel {
  background: none; border: none;
  font-size: 16px; color: var(--text2); cursor: pointer; padding: 4px 0;
  font-weight: 500; transition: opacity .15s;
}
.edit-cancel:active { opacity: .6 }
.edit-save {
  padding: 8px 20px; border-radius: 99px; border: none;
  background: linear-gradient(135deg, #818CF8 0%, #6366F1 60%, #4F46E5 100%);
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 3px 12px rgba(var(--accent-rgb),.4);
  transition: opacity .15s;
}
.edit-save:active { opacity: .8 }
.edit-hdr h2 { font-size: 17px; font-weight: 700 }

.edit-body { padding: 0 16px }
.edit-section-title {
  font-size: 11px; font-weight: 800; color: var(--text2);
  text-transform: uppercase; letter-spacing: .7px;
  margin: 20px 0 8px 4px;
}
.edit-card { background: var(--surface); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-sm) }

.name-row { display: flex; align-items: center; padding-right: 14px }
.name-input {
  flex: 1; padding: 14px 12px 14px 16px;
  border: none; background: transparent;
  font-size: 16px; color: var(--text); font-family: inherit; outline: none; font-weight: 500;
}
.name-input::placeholder { color: var(--text3) }
.color-dot-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,.4);
  cursor: pointer; flex-shrink: 0;
  transition: transform .15s;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.color-dot-btn:active { transform: scale(.86) }
.sep-line { height: 1px; background: var(--sep); margin: 0 16px }

.reg-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
}
.reg-row + .reg-row { border-top: 1px solid var(--sep) }
.reg-label { font-size: 16px; font-weight: 500 }
.reg-value { font-size: 14px; color: var(--text2); font-weight: 500 }

.ios-toggle { position: relative; width: 51px; height: 44px; flex-shrink: 0; display: flex; align-items: center }
.ios-toggle input { opacity: 0; width: 0; height: 0 }
.ios-track {
  position: relative; width: 51px; height: 31px; flex-shrink: 0;
  background: var(--sep); border-radius: 99px; cursor: pointer; transition: background .22s;
}
.ios-track::after {
  content: ''; position: absolute;
  width: 27px; height: 27px; left: 2px; top: 2px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
  transition: transform .22s cubic-bezier(.4,0,.2,1);
}
.ios-toggle input:checked + .ios-track { background: var(--green) }
.ios-toggle input:checked + .ios-track::after { transform: translateX(20px) }

.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); padding: 10px 8px; gap: 2px }
.emoji-btn {
  aspect-ratio: 1; border-radius: 10px; border: none;
  background: transparent; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s, transform .1s;
}
.emoji-btn:active { transform: scale(.82) }
.emoji-btn.selected { background: var(--accent-lt) }

.color-grid { display: grid; grid-template-columns: repeat(6, 1fr); padding: 14px; gap: 10px }
.color-circle {
  aspect-ratio: 1; border-radius: 50%; border: none;
  cursor: pointer; transition: transform .15s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.color-circle:active { transform: scale(.86) }
.color-circle .ck { font-size: 14px; color: #fff; font-weight: 800; opacity: 0; transition: opacity .15s }
.color-circle.selected { transform: scale(1.1) }
.color-circle.selected .ck { opacity: 1 }
</style>
</head>
<body>
<div class="app-shell">

<!-- ══ MAIN ══════════════════════════════════════════ -->
<div id="screen-main">
  <div class="main-header">
    <div class="header-row">
      <div>
        <div class="header-greeting" id="header-greeting">Olá! 👋</div>
        <div class="header-date" id="header-date"></div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="theme-btn" onclick="toggleTheme()"></button>
        <button class="icon-btn" id="sync-btn" onclick="handleSyncBtn()" title="Sincronizar">☁️</button>
        <button class="add-btn" onclick="openAdd()">＋</button>
      </div>
    </div>
  </div>

  <!-- Progress Hero -->
  <div class="progress-hero">
    <div class="hero-ring-wrap">
      <div id="hero-ring"></div>
      <div class="hero-ring-text">
        <div class="hero-pct" id="hero-pct-text">0%</div>
        <div class="hero-pct-lbl">hoje</div>
      </div>
    </div>
    <div class="hero-info">
      <div class="hero-title" id="hero-title">Nenhum hábito</div>
      <div class="hero-sub"   id="hero-sub">Toque em + para começar</div>
      <div class="hero-track">
        <div class="hero-fill" id="bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Date strip -->
  <div class="date-strip-wrap">
    <div class="ds-label">Últimos 5 dias</div>
    <div class="ds-cols" id="ds-cols"></div>
  </div>

  <!-- Habit list -->
  <div class="habit-list" id="list"></div>
</div>

<!-- ══ DETAIL ══════════════════════════════════════════ -->
<div class="overlay" id="screen-detail">
  <div class="detail-hdr">
    <button class="back-btn" onclick="closeDetail()">‹</button>
    <h2 id="detail-title"></h2>
    <button class="edit-pill-btn" onclick="openEdit(currentHabitId)">Editar</button>
  </div>
  <div class="detail-freq" id="detail-freq">
    <div class="freq-item">🔄 <span>Todos os dias</span></div>
    <div class="freq-item">⏰ <span id="detail-time">--:--</span></div>
  </div>
  <div class="detail-body">
    <div class="detail-section-title">Visão Geral</div>
    <div class="detail-section">
      <div class="overview-row">
        <div class="overview-ring" id="detail-ring"></div>
        <div class="overview-stats">
          <div class="stat-col">
            <div class="stat-val" id="stat-score">0%</div>
            <div class="stat-lbl">Score</div>
          </div>
          <div class="stat-col">
            <div class="stat-val" id="stat-month">+0%</div>
            <div class="stat-lbl">Mês</div>
          </div>
          <div class="stat-col">
            <div class="stat-val" id="stat-year">+0%</div>
            <div class="stat-lbl">Ano</div>

function dateKey(d) {
  if (!d) d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function today() { return dateKey() }

// ── Calculations ───────────────────────────────────────
function calcStreak(id, comp) {
  const t = today(), d = new Date();
  if (!(comp[t]||[]).includes(id)) d.setDate(d.getDate()-1);
  let n = 0;
  while (n < 3650) {
    const k = dateKey(d);
    if ((comp[k]||[]).includes(id)) { n++; d.setDate(d.getDate()-1); } else break;
  }
  return n;
}
function calcScore(id, comp) {
  const t=today(), now=new Date();
  const allDates=Object.keys(comp).filter(d=>d<=t).sort();
  let totalDays=1, totalDone=0;
  if (allDates.length) {
    const start=new Date(allDates[0]);
    totalDays=Math.max(1,Math.round((now-start)/86400000)+1);
    for (const [day,ids] of Object.entries(comp)) if (day<=t&&ids.includes(id)) totalDone++;
  }
  const dom=now.getDate(), yr=now.getFullYear(), mo=now.getMonth();
  let mDone=0;
  for (let i=1;i<=dom;i++) {
    const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if ((comp[k]||[]).includes(id)) mDone++;
  }
  const doy=Math.round((now-new Date(yr,0,1))/86400000)+1;
  let yDone=0;
  for (let i=0;i<doy;i++) {
    const d2=new Date(yr,0,1+i);
    const k=dateKey(d2);
    if (k<=t&&(comp[k]||[]).includes(id)) yDone++;
  }
  return {
    score: Math.round(totalDone/totalDays*100),
    month: Math.round(mDone/dom*100),
    year:  Math.round(yDone/doy*100),
  };
}
function monthPct(id, comp) {
  const now=new Date(), dom=now.getDate(); let done=0;
  for (let i=1;i<=dom;i++) {
    const k=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if ((comp[k]||[]).includes(id)) done++;
  }
  return dom>0 ? done/dom : 0;
}

function miniRing(id, comp, color) {
  const S=30,r=12,cx=15,cy=15;
  const circ=+(2*Math.PI*r).toFixed(2);
  const pct=monthPct(id,comp);
  const off=+(circ*(1-pct)).toFixed(2);
  const isDone=(comp[today()]||[]).includes(id);
  const arc=pct>0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="2.5"
    stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`:'';
  const center=isDone
    ?`<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" font-weight="800" fill="${color}">✓</text>`
    :'';
  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--sep)" stroke-width="2.5"/>
    ${arc}${center}</svg>`;
}

function heroRing(pct, color) {

  const circ=+(2*Math.PI*r).toFixed(2), off=+(circ*(1-pct/100)).toFixed(2);

    ${arc}

}

    ${arc}

  </svg>`;
}

function chartHTML(id, comp, color, view) {
  const W=320,H=110,pL=28,pR=8,pT=8,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const x=f=>pL+f*cW, y=v=>pT+(1-v/100)*cH;
  let pts=[];
  if (view==='month') {
    for (let i=0;i<30;i++) {
      const d=new Date();d.setDate(d.getDate()-(29-i));
      pts.push({f:i/29,v:(comp[dateKey(d)]||[]).includes(id)?100:0});
    }
  } else {
    for (let i=0;i<12;i++) {
      const d=new Date();d.setMonth(d.getMonth()-(11-i));
      const yr=d.getFullYear(),mo=d.getMonth(),dim=new Date(yr,mo+1,0).getDate(),last=i===11?new Date().getDate():dim;
      let done=0;
      for (let day=1;day<=last;day++) {
        const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if ((comp[k]||[]).includes(id)) done++;
      }
      pts.push({f:i/11,v:Math.round(done/last*100)});
    }
  }
  const poly=pts.map(p=>`${x(p.f).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
  const area=`${x(0).toFixed(1)},${(pT+cH).toFixed(1)} ${poly} ${x(1).toFixed(1)},${(pT+cH).toFixed(1)}`;
  const grid=[0,50,100].map(v=>`<line x1="${pL}" y1="${y(v).toFixed(1)}" x2="${pL+cW}" y2="${y(v).toFixed(1)}" stroke="var(--sep)" stroke-width="0.5"/>
    <text x="${pL-3}" y="${(y(v)+4).toFixed(1)}" text-anchor="end" font-size="8" fill="var(--text2)">${v}</text>`).join('');
  const ticks=view==='month'
    ?[0,7,14,21,29].map(i=>{const d=new Date();d.setDate(d.getDate()-(29-i));return `<text x="${x(i/29).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--text2)">${d.getDate()}/${d.getMonth()+1}</text>`;}).join('')
    :[0,3,6,9,11].map(i=>{const d=new Date();d.setMonth(d.getMonth()-(11-i));return `<text x="${x(i/11).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--text2)">${MONTHS_S[d.getMonth()]}</text>`;}).join('');
  const dots=pts.map(p=>`<circle cx="${x(p.f).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.5" fill="${color}"/>`).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${grid}<polygon points="${area}" fill="${color}20"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${ticks}</svg>`;
}

function calendarHTML(id, comp, color, yr, mo) {
  const t=today(), firstDow=(new Date(yr,mo,1).getDay()+6)%7, dim=new Date(yr,mo+1,0).getDate();
  let cells='';
  for (let i=0;i<firstDow;i++) cells+=`<div class="cal-cell"></div>`;
  for (let d=1;d<=dim;d++) {
    const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done=(comp[k]||[]).includes(id), isT=k===t, isFut=k>t;
    let cls='cal-day',sty='';
    if (done)      { cls+=' done'; sty=`background:${color}` }
    else if (isT)  { cls+=' today'; sty=`border:2.5px solid ${color};color:${color}` }
    else if (isFut){ cls+=' future' }
    cells+=`<div class="cal-cell"><div class="${cls}" style="${sty}">${d}</div></div>`;
  }
  return `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="navMonth(-1)">‹</button>
    <span class="cal-month-label">${MONTHS[mo]} ${yr}</span>
    <button class="cal-nav-btn" onclick="navMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    ${WDAYS_MON.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
    ${cells}
  </div>`;
}

  editingHabitId=id; editEmoji=h.emoji; editColor=h.color; colorPickerOpen=false;
  document.getElementById('edit-title').textContent='Editar Hábito';
  document.getElementById('edit-name').value=h.name;
  document.getElementById('edit-question').value=h.question||'';
  document.getElementById('edit-remind').checked=!!h.remind;
  document.getElementById('color-section').style.display='none';
  buildPickers();
  document.getElementById('screen-edit').classList.add('open');
  document.getElementById('screen-edit').scrollTop=0;
}
function closeEdit() { document.getElementById('screen-edit').classList.remove('open') }
function saveHabit() {
  const name=document.getElementById('edit-name').value.trim();
  if (!name) { document.getElementById('edit-name').focus(); return; }
  const question=document.getElementById('edit-question').value.trim();
  const remind=document.getElementById('edit-remind').checked;
  const habits=getHabits();
  if (editingHabitId) {
    const h=habits.find(h=>h.id===editingHabitId);
    if (h) { h.name=name; h.emoji=editEmoji; h.color=editColor; h.question=question; h.remind=remind; }
  } else {
    habits.push({id:uid(),emoji:editEmoji,name,color:editColor,question,remind});
  }
  saveHabits(habits); closeEdit();
  if (editingHabitId) renderDetail();
  render();
}

// ── Toggle ─────────────────────────────────────────────
function toggle(id, e) {
  e.stopPropagation();
  const c=getComp(), d=today();
  c[d]=c[d]||[];
  const i=c[d].indexOf(id);
  i>=0 ? c[d].splice(i,1) : c[d].push(id);
  saveComp(c); render();
  if (currentHabitId===id) renderDetail();
}

// ── Greeting ───────────────────────────────────────────
function setGreeting() {
  const h=new Date().getHours();
  const greet = h<12 ? 'Bom dia! ☀️' : h<18 ? 'Boa tarde! 🌤' : 'Boa noite! 🌙';
  document.getElementById('header-greeting').textContent=greet;
  const now=new Date();
  const dayName=WDAYS[now.getDay()];
  const dayNum=now.getDate();
  const monthName=MONTHS[now.getMonth()];
  document.getElementById('header-date').textContent=`${dayName}, ${dayNum} de ${monthName}`;
}

// ── Main render ────────────────────────────────────────
function render() {
  setGreeting();
  const habits=getHabits(), comp=getComp(), t=today(), days=last5();

  // Date strip
  document.getElementById('ds-cols').innerHTML=days.map(d=>{
    const dt=new Date(d+'T12:00:00'), isT=d===t;
    return `<div class="ds-col${isT?' today':''}">
      <div class="dn">${dt.getDate()}</div>
      <div class="dw">${WDAYS[dt.getDay()]}</div>
    </div>`;
  }).join('');

  // Hero progress
  const done=(comp[t]||[]).length, total=habits.length;
  const pct=total ? Math.round(done/total*100) : 0;
  const allDone=total>0 && done===total;
  const heroColor = allDone ? '#34C759' : 'var(--accent)';
  const heroColorRaw = allDone ? '#34C759' : '#6366F1';

  document.getElementById('hero-ring').innerHTML=heroRing(pct, heroColorRaw);
  document.getElementById('hero-pct-text').textContent=pct+'%';
  document.getElementById('hero-pct-text').style.color=heroColor;
  document.getElementById('bar').style.background=heroColor;
  document.getElementById('bar').style.width=total?(done/total*100)+'%':'0%';

  if (total===0) {
    document.getElementById('hero-title').textContent='Nenhum hábito ainda';
    document.getElementById('hero-sub').textContent='Toque em + para começar';
  } else if (allDone) {
    document.getElementById('hero-title').textContent='Perfeito! 🎉';
    document.getElementById('hero-sub').textContent=`${total} de ${total} concluídos`;
  } else {
    document.getElementById('hero-title').textContent=`${done} de ${total} concluídos`;
    document.getElementById('hero-sub').textContent=done===0 ? 'Vamos começar o dia!' : `${total-done} restante${total-done===1?'':'s'}`;
  }

  // Habit list
  if (habits.length===0) {
    document.getElementById('list').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-title">Sem hábitos ainda</div>
        <div class="empty-sub">Crie seu primeiro hábito e comece a construir uma rotina incrível.</div>
        <button class="empty-cta" onclick="openAdd()">Criar hábito</button>
      </div>`;
  } else {
    document.getElementById('list').innerHTML = habits.map(h => {
      const isDone=(comp[t]||[]).includes(h.id);
      const streak=calcStreak(h.id,comp);
      const streakHtml=streak>0
        ?`<div class="habit-streak ${streak>=3?'streak-hot':'streak-cold'}">🔥 ${streak} ${streak===1?'dia':'dias'}</div>`:'';
      const inds=days.map(d=>{
        if (d>t) return `<div class="day-ind"><div class="ind"></div></div>`;
        const ok=(comp[d]||[]).includes(h.id);
        if (ok)    return `<div class="day-ind"><div class="ind done" style="background:${h.color}">✓</div></div>`;
        if (d===t) return `<div class="day-ind"><div class="ind pending"></div></div>`;
        return `<div class="day-ind"><div class="ind missed">×</div></div>`;
      }).join('');
      return `<div class="habit-row${isDone?' done':''}">
        <div class="ring-tap" onclick="toggle('${h.id}',event)">${miniRing(h.id,comp,h.color)}</div>
        <div class="habit-info" onclick="openDetail('${h.id}')">
          <div class="habit-name" style="${isDone?'':` color:${h.color}`}">${h.emoji} ${h.name}</div>
          ${streakHtml}
        </div>
        <div class="day-inds" onclick="openDetail('${h.id}')">${inds}</div>
      </div>`;
    }).join('');
  }
}

render();
</script>
</body>
</html>
